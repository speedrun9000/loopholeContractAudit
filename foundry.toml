[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.27"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "murky/=lib/murky/src/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

no_match_contract = "NftMarketplaceManualTester"

[lint]
ignore = ["test/**/*"]
exclude_lints = ["screaming-snake-case-immutable", "mixed-case-variable", "unwrapped-modifier-logic"]